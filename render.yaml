services:
  - type: web
    name: realtalk-api
    env: python
    buildCommand: pip install -r requirements.txt && python -m textblob.download_corpora
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false   # You will paste your key in the Render dashboard
    autoDeploy: true
